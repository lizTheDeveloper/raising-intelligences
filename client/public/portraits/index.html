<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #0a0a0a; font-family: 'IBM Plex Mono', monospace; color: #888; display: flex; gap: 24px; padding: 40px; flex-wrap: wrap; }
  figure { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  img { width: 220px; height: 220px; object-fit: cover; display: block; }
  figcaption { font-size: 11px; letter-spacing: 3px; }
</style>
</head>
<body>

  <figure>
    <img src="age-03.png" alt="age 3">
    <figcaption>— age 3 —</figcaption>
  </figure>
  <figure>
    <img src="age-07.png" alt="age 7">
    <figcaption>— age 7 —</figcaption>
  </figure>
  <figure>
    <img src="age-12.png" alt="age 12">
    <figcaption>— age 12 —</figcaption>
  </figure>
  <figure>
    <img src="age-16.png" alt="age 16">
    <figcaption>— age 16 —</figcaption>
  </figure>
</body>
</html>
